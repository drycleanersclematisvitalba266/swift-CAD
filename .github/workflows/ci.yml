name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: SwiftPM
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Swift 6.3.1
        run: |
          curl -L https://download.swift.org/swiftly/darwin/swiftly.pkg -o swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --quiet-shell-followup --assume-yes --skip-install
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          swiftly install --use 6.3.1
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test --no-parallel

      - name: Check forbidden Swift patterns
        run: |
          if grep -R -n -E 'try\?|@unchecked Sendable|EventLoopFuture|DispatchQueue|fatalError|precondition|assert\(|try!|as!' Sources Tests; then
            exit 1
          fi

      - name: Check zero-copy transport regressions
        run: |
          if grep -R -n -E 'Data\(contentsOf:|String\(contentsOf:|public func .*-> Data|public func .*export.*Data' Sources/CADExchange Sources/SwiftCAD; then
            exit 1
          fi

  wasm:
    name: WebAssembly
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Swift 6.3.1
        run: |
          curl -L https://download.swift.org/swiftly/darwin/swiftly.pkg -o swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --quiet-shell-followup --assume-yes --skip-install
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          swiftly install --use 6.3.1
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"

      - name: Install Swift WebAssembly SDK
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.3.1-release/wasm-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2

      - name: Build for WebAssembly
        run: swift build --swift-sdk swift-6.3.1-RELEASE_wasm
